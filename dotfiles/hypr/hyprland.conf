###################
### MY PROGRAMS ###
###################
        
$terminal = kitty
$fileManager = kitty -e yazi
$menu = rofi
$browser = brave
$editor = code

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# XWayland fractional scaling fix — GTK apps: render at 2x then scale down to net 1.5x
env = GDK_SCALE,2
env = GDK_DPI_SCALE,0.75
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

###############
### XWAYLAND ###
###############

xwayland {
    force_zero_scaling = true
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 2
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 1
        passes = 2

        vibrancy = 0.1696
    }
}

input:natural_scroll = 0
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

gesture = 3, horizontal, workspace
misc:disable_hyprland_logo = 1
misc:force_default_wallpaper = -1

source = ./keybindings.conf
source = ./autostart.conf
source = ./animations.conf
source = ./noctalia/noctalia-colors.conf
source = ./windowrules.conf
source = ~/.config/hypr-host.conf #contents automatically generated by nix, do not edit. dynamically sources hosts/$hostname.conf
