# VM: auto-detect display (kein DP-1/DP-2 in QEMU)
monitor = ,preferred,auto,1

# VM: Software-Rendering falls kein passender Vulkan/GPU-Treiber verfügbar
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = LIBGL_ALWAYS_SOFTWARE,1

input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
}

# noctalia-shell wird unter Fedora via qs -c aufgerufen
exec-once = qs -c noctalia-shell

bind = $mainMod, SPACE, exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mainMod, L, exec, qs -c noctalia-shell ipc call lockScreen lock
bind = $mainMod ALT, W, exec, qs -c noctalia-shell ipc call wallpaper toggle
bind = $mainMod ALT, T, exec, qs -c noctalia-shell ipc call settings openTab "colorScheme"
bind = CTRLALT, DELETE, exec, qs -c noctalia-shell ipc call sessionMenu toggle
